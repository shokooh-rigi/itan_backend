export default "<mat-card class=\"app-project-card\">\n    <div class=\"mat-card-header\">\n        <div class=\"mat-card-title\">{{details.title}}</div>\n    </div>\n\n    <mat-card-content>\n        <div class=\"app-address\">\n            <p class=\"app-part-1\">{{details.address.part1}}</p>\n            <p class=\"app-part-2\">{{details.address.part2}}</p>\n        </div>\n        <div class=\"app-info\">\n            <p class=\"app-part-1\">Estimator: <span>{{details.estimator}}</span></p>\n            <p class=\"app-part-2\">Tech: <span>{{details.tech}}</span></p>\n        </div>\n        <div class=\"app-progress\">\n            <app-step-progress-bar [steps]=\"steps\" [properties]=\"properties\"></app-step-progress-bar>\n        </div>\n    </mat-card-content>\n</mat-card>"
