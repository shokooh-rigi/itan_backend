export default "<div class=\"app-progress-bar\">\r\n    <div *ngFor=\"let item of connectors\"\r\n        [ngStyle]=\"{'left': item.left, 'background-color': item.active? properties.activeColor:properties.inactiveColor, 'width': connectorWidth, 'height': connectorHeight,'top': connectorTop}\"\r\n        class=\"app-connector\"></div>\r\n\r\n    <div *ngFor=\"let step of steps; let i=index\" [ngStyle]=\"{'font-size': properties.fontSize, 'width': connectorWidth}\"\r\n        class=\"app-step\">\r\n        <div [ngStyle]=\"{'background-color': step.passed? properties.activeColor:properties.inactiveColor, 'width': iconSize, 'height': iconSize}\"\r\n            class=\"app-icon\">\r\n            <img *ngIf=\"step.passed\" class=\"app-icon-img\" [src]=\"step.icon\">\r\n        </div>\r\n        <div [ngStyle]=\"{'color': step.active? properties.activeTextColor:properties.inactiveTextColor}\" class=\"app-text\">\r\n            {{step.title}}</div>\r\n    </div>\r\n</div>"
