{% extends 'base.html' %}
{% load static %}
{% load estimator_tags %}

{% block content %}
    <h2>Generate Report Sheet</h2>
    <form method = 'POST' action= '' enctype = "multipart/form-data" id="sheetAdd-form">
        <div class="form-group">
            {% csrf_token %}
            <div class="row form-line">
                <div class="col-lg-12">
                    <label for="id_project" class="control-label">Project <span class="required">*</span></label>
                    <select name="project" class="form-control" required="" id="id_project" style="transform: translateX(-9px);">
                        <option value="" selected="" data-projectname="">---------</option>
                        {% for order in orders %}
                            <option value="{{ order.id }}" data-projectname="{{ order.proposal.quote.estimate.project.name }}">
                                {{ order.project_number }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="total_amount" class="control-label">Project Name</label>
                    <span class="form-control" id="project_name" style="max-width:230px;min-height: 36px; height: auto; background-color: #eee;"></span>
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="id_sheet_date" class="control-label">Report Date <span class="required">*</span></label>
                    {{ form.report_date }}
                </div>
            </div>
            <br />
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="id_validity" class="control-label text-center">General Notes & Comments</label>
                    {{ form.general_notes_and_comments }}
                </div>
            </div>

{#            <div class="row form-line">#}
{#                <div class="col-lg-12" style="padding-right: 36px;">#}
{#                    <label for="id_validity" class="control-label">Type <span class="required">*</span></label>#}
{#                    <select name="test_sheet_type" class="form-control" required="" id="id_test_sheet_type">#}
{#                    {% for x, y in form.fields.test_sheet_type.choices %}#}
{#                        <option value="{{ x }}" {% if x.sheet_generator %}disabled{% endif %}>{{ y }}</option>#}
{#                    {% endfor %}#}
{#                    </select>#}
{#                </div>#}
{#            </div>#}

            <div class="row">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <input type="submit" class="btn btn-success" value="Generate" name="next" />
                    <input type="submit" class="btn btn-danger" value="Cancel" name="cancel" formnovalidate />
                </div>
            </div>
        </div>
	</form>
    <script>
        $(document).ready(function() {
            $('#id_project').on('change', function() {
                if($(this).val() === '') {
                    $("#project_name").text('');
                }
                else {
                    $("#project_name").text($(this).find(':selected').data('projectname'));

                }
            });
        });
    </script>
    <script>
        $(function () {
            $("#id_report_date").datetimepicker({
                format: 'm/d/Y',
                timepicker: false,
                scrollInput: false,
            });
        });
    </script>

{% endblock %}
