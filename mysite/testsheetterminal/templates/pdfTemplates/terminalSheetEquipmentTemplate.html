{% load static %}
{% load sheet_tags %}

<html>
<head>
    <meta charset="utf-8">
    <title>Air Terminal Sheet</title>
    {% include "pdfTemplates/headStyle.html" %}
    <style>
        .pdf-page-content {
            page-break-after: always;
        }

        .pdf-table {
            height: auto;
            border: none;
            font-size: 11px;
            text-align: center;
        }

        /* Table head section ======================================================================================= */
        .pdf-table thead .pdf-head-tr {
            padding: 0;
            margin: 0;
            border: none;
        }

        .pdf-table thead .pdf-head-tr th {
            width: 9.5%;
            padding: 0;
            margin: 0;
            border: none;
            height: 0;
        }

        .pdf-table thead .pdf-head-tr th.wide-th {
            width: 14.5%;
        }

        /* Table title ============================================================================================== */
        .pdf-table .pdf-table-title {
            font-size: 14px;
            font-weight: bold;
            text-decoration: underline;
        }

        .pdf-table .pdf-table-title .pdf-table-title-td {
            padding-bottom: 8px;
        }

        .pdf-table .pdf-table-title .pdf-table-title-td.pdf-page-number {
            text-align: right;
        }

        /* Table cell =============================================================================================== */
        .pdf-table .pdf-table-cell {
            font-weight: normal;
            border: 1px solid black;
            padding: 5px 2px 1px;
            height: 31px;
        }

        .pdf-table .pdf-table-cell.pdf-table-title-cell {
            font-weight: bold;
            text-align: left;
        }

        .pdf-table .pdf-table-cell.pdf-table-title-cell.center-title {
            text-align: center;
        }

        .pdf-table .pdf-table-cell.pdf-table-title-second-row {
            border-bottom: none;
            padding-bottom: 0;
        }

        .pdf-table .pdf-table-cell.pdf-table-title-third-row {
            border-top: none;
            padding-top: 0;
        }

        /* Table rows =============================================================================================== */
        .pdf-table-row {
            border: 2px solid black;
        }

        .pdf-table-row.section-first-row {
            border-bottom: none;
        }

        .pdf-table-row.section-middle-row {
            border-top: none;
            border-bottom: none;
        }

        .pdf-table-row.section-last-row {
            border-top: none;
        }

        /* Project specifications =================================================================================== */
        .pdf-table .pdf-table-project-tr {
            text-align: left;
        }

        .pdf-table .pdf-table-project-tr .pdf-table-title-cell {
            border: none;
        }

        .pdf-table .pdf-table-project-tr .pdf-table-center-cell {
            text-align: center;
        }

        /* Note section ============================================================================================= */
        .pdf-table .pdf-table-note-section {
            border: none;
        }

        .pdf-table .pdf-table-note-section td {
            font-weight: normal;
            padding: 5px 2px 1px;
            text-align: left;
            border: none;
        }

        .pdf-table .pdf-table-note-section td.note-title {
            font-weight: bold;
            vertical-align: top;
        }

        .note-div {
            display: inline-block;
        }

        .note-div:after {
            content: "-";
        }

        .note-div:last-child:after {
            content: "";
        }

        .keep_together {
            -pdf-keep-with-next: true;
        }

        .seperator {
            -pdf-keep-with-next: false;
        }
    </style>
</head>
<body>

{% include "pdfTemplates/pdfHeaderTemplate.html" %}

{% include "pdfTemplates/pdfFooterTemplate.html" %}


<div id="content_frame">
    {% for page in pages %}
        {% include "pdfTemplates/terminalPdfContent.html" %}
    {% endfor %}

</div>
</body>
</html>
