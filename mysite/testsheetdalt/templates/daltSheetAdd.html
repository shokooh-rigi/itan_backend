{% extends 'base.html' %}
{% load static %}
{% load estimator_tags %}

{% block content %}
    <h2>Generate Dalt Test Sheet</h2>
    <form method = 'POST' action= '' enctype = "multipart/form-data" id="sheetAdd-form">
        <div class="form-group">
            {% csrf_token %}
{#            {{ form.test_sheet_type }}#}
            <div class="row form-line">
                <div class="col-lg-12">
                    <label for="id_project" class="control-label">Project <span class="required">*</span></label>
                    <select name="project" class="form-control" required="" id="id_project" style="transform: translateX(-9px);">
                        <option value="" selected="" data-projectname="">---------</option>
                        {% for order in orders %}
                            <option value="{{ order.id }}" data-projectname="{{ order.proposal.estimate.project.name }}">
                                {{ order.project_number }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="total_amount" class="control-label">Project Name</label>
                    <span class="form-control" id="project_name" style="max-width:230px;min-height: 36px; height: auto; background-color: #eee;"></span>
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="id_sheet_date" class="control-label">Date <span class="required">*</span></label>
                    {{ form.sheet_date }}
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="id_validity" class="control-label">System Name <span class="required">*</span></label>
                    {{ form.system }}
                </div>
            </div>
            <div class="row form-line">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <label for="id_validity" class="control-label">Dalt Equipment Quantity <span class="required">*</span></label>
                    {{ form.equipment_quantity }}
                </div>
            </div>

            <div class="row">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <input type="submit" class="btn btn-success" value="Generate" name="next" />
                    <input type="submit" class="btn btn-danger" value="Cancel" name="cancel" formnovalidate />
                </div>
            </div>
        </div>
	</form>
    <script>
        $('#id_project').on('change', function() {
            if($(this).val() === '') {
                $("#project_name").text('');
            }
            else {
                $("#project_name").text($(this).find(':selected').data('projectname'));

            }
        });
    </script>
    <script>
        $(function () {
            $("#id_sheet_date").datetimepicker({
                format: 'm/d/Y',
                timepicker: false,
                scrollInput: false,
            });
        });
    </script>

{% endblock %}
