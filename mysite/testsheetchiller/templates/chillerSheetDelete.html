{% extends 'base.html' %}
{% load estimator_tags %}

{% block content %}
    {{ error_message }}
    <div class="alert alert-danger" style="{% if error_msg == null %}display: none;{% endif %}">
        <strong>Error!</strong> {{ error_msg }}
    </div>
    <br />
    {%if request.user.is_authenticated %}
        <h2>Delete Pump Sheet '{{ this_sheet }}'</h2>
        <br />
        <form method="POST" action="">
            {% csrf_token %}
            Are you sure you want to delete this Sheet?<br /><br />
            <input type="submit" class="btn btn-primary" value="Yes" name="confirm" />
            <input type="submit" class="btn btn-danger" value="Cancel" name="cancel" />
        </form>
    {% endif %}

{% endblock %}
