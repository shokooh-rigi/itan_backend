{% extends 'base.html' %}
{% load static %}
{% load custom_tags %}

{% block content %}
    <h2>Review Equipment Design Values</h2>
    <div class="alert alert-danger" style="{% if error_msg == null %}display: none;{% endif %}">
        <strong>Error!</strong> {{ error_msg }}
    </div>
    <form method = 'POST' action= '' enctype = "multipart/form-data" id="equipmentValues-form">
        <div class="form-group">
            {% csrf_token %}
            </div>
            <div class="row form-line" style="font-weight: bold;">
                <div class="col-lg-4">
                    Field Title
                </div>
                <div class="col-lg-3">
                    Field Range or Values
                </div>
                <div class="col-lg-5">
                    Design Value
                </div>
            </div>
            {% for custom_field in custom_fields %}
            <div class="row form-line">
                <div class="col-lg-4">
                    <label for="id_architect_name" class="control-label">{{ custom_field.field_name }}</label>
                </div>
                <div class="col-lg-3">
                    <label for="id_architect_name" class="control-label">
                    {% if custom_field.field_range_or_selective == 1 %}
                        [{% for number in custom_field.field_range|split %}
                           {{ number }}{%if not forloop.last%} - {%endif%}
                        {% endfor %}]
                    {% elif custom_field.field_range_or_selective == 2 %}
                        {% for number in custom_field.field_range|split %}
                            {{ number }}
                        {% endfor %}
                    {% endif %}

                    </label>
                </div>
                <div class="col-lg-5">
                    <label for="id_architect_name" class="control-label" style="width: 100%;"><input style="width: 100%;" type="text" name="company_value_{{ custom_field.id }}" maxlength="50" class="form-control" required="" id="id_company_value" value="{% get_post_variable request custom_field this_equipment %}"></label>
                    <div class="col-md-2" style="position: absolute; opacity: 0.5; top: 5px; right: 10px; pointer-events: none;">
                        <label style="width: 100%; text-align: right;" for="id_architect_name">{{ custom_field.field_postfix }}</label>
                    </div>
                </div>
            </div>
            {% endfor %}
            <div class="row">
                <div class="col-lg-12" style="padding-right: 36px;">
                    <input type="submit" class="btn btn-primary" value="It's all good" name="next" />
                    <input type="submit" class="btn btn-info" value="Back" name="cancel" formnovalidate />
                </div>
            </div>
        </div>
	</form>
    <script>
        $('#id_proposal').on('change', function() {
            if($(this).val() === '') {
                $("#customer").text('');
                $("#engineer").text('');
                $("#tab_amount").text('');
                $("#pre_amount").text('');
                $("#total_amount").text('');
                $("#dlink_href").attr("href", '').hide();
            }
            else {
                $("#customer").text($(this).find(':selected').data('customer'));
                $("#engineer").text($(this).find(':selected').data('engineer'));
                $("#tab_amount").text($(this).find(':selected').data('tabamount'));
                $("#pre_amount").text($(this).find(':selected').data('preamount'));
                $("#total_amount").text($(this).find(':selected').data('totalamount'));
                $("#dlink_href").attr("href", $(this).find(':selected').data('dlink')).show();
            }
        });
    </script>
    <script>
        $(function () {
            $("#id_date_po_received, #id_estimated_date_of_project").datetimepicker({
                format: 'm/d/Y',
                timepicker: false,
                scrollInput: false,
            });
        });
    </script>

{% endblock %}
